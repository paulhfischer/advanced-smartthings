########
# RUFF #
########

[tool.ruff]
target-version = "py312"
line-length = 320
force-exclude = true
src = ["rootfs", "tests"]

[tool.ruff.lint]
select = ["ALL"]
ignore = [
  "A001", "A002", "A005",
  "ARG001",
  "B905",
  "BLE001",
  "C901",
  "COM812",
  "D",
  "DTZ001", "DTZ005", "DTZ007",
  "E203", "E302", "E501",
  "EM101", "EM102",
  "ERA001",
  "EXE001",
  "FBT001", "FBT003",
  "FIX002",
  "G004",
  "ICN001",
  "INP001",
  "N813", "N814", "N999",
  "PERF401", "PERF402",
  "PLC0414", "PLC0415",
  "S104",
  "PLR0911", "PLR0912", "PLR0913", "PLR0915", "PLR2004",
  "PLW0108", "PLW0603",
  "PT006", "PT007",
  "PTH100", "PTH103", "PTH110", "PTH112", "PTH117", "PTH118", "PTH120", "PTH123", "PTH207", "PTH208",
  "RET504",
  "RUF001", "RUF007", "RUF028",
  "S101", "S105", "S603",
  "SIM103", "SIM108", "SIM110",
  "TC001", "TC002", "TC003",
  "TC006",
  "TD002", "TD003", "TD004", "TD005",
  "TRY003", "TRY300", "TRY301", "TRY400",
  "UP047",
  "W505",
]
future-annotations = true

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S106"]

[tool.ruff.lint.flake8-builtins]
strict-checking = true

[tool.ruff.lint.flake8-type-checking]
strict = true

[tool.ruff.lint.isort]
force-single-line = true
force-sort-within-sections = true
known-first-party = ["app"]
lines-after-imports = 2
order-by-type = false
required-imports = ["from __future__ import annotations"]
