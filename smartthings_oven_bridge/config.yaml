name: "SmartThings Oven Bridge"
version: "1.1.1"
slug: "smartthings_oven_bridge"
description: >-
  Bridge between Home Assistant and the SmartThings API for Samsung oven control.
arch:
  - aarch64
  - amd64
startup: application
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:stove
panel_title: SmartThings Oven
homeassistant_api: true
watchdog: "http://[HOST]:[PORT:8080]/health"
stage: stable
options:
  smartthings_client_id: null
  smartthings_client_secret: null
  log_level: info
schema:
  smartthings_client_id: str
  smartthings_client_secret: password
  smartthings_device_id: str?
  log_level: "list(debug|info|warning|error)"
